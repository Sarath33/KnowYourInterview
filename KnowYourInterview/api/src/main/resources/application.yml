spring:
  application:
    name: know-your-interview-api

  datasource:
    url: jdbc:postgresql://localhost:5432/kyi
    username: kyi
    password: kyi_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

logging:
  level:
    com.knowyourinterview: INFO

app:
  jwt:
    # Local-dev-only default. Override with the JWT_SECRET env var for any shared/deployed environment —
    # HMAC-SHA256 needs >= 256 bits; this is a placeholder, not a real secret.
    secret: ${JWT_SECRET:dev-only-change-me-0123456789abcdef0123456789abcdef}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  password-reset:
    token-ttl-minutes: 60
  storage:
    # Local-disk proof storage for dev. Swap for an S3-backed implementation of
    # ProofStorageService in Phase 6 without touching callers.
    proof-dir: ${PROOF_STORAGE_DIR:./uploads/proof}
  pricing:
    # Platform-fixed viewer unlock price (paise), applied to every experience at
    # creation time — contributors don't set their own price. Tiering by company/role
    # is a later feature.
    default-price-paise: 9900
    # Flat one-time contributor payout (paise) on publish — separate from the viewer
    # price above; per the Phase 0 design these are two independent platform-set amounts.
    contributor-payout-paise: 50000
