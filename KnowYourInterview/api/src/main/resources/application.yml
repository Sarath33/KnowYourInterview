spring:
  application:
    name: know-your-interview-api

  datasource:
    url: jdbc:postgresql://localhost:5432/kyi
    username: kyi
    password: kyi_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

logging:
  level:
    com.knowyourinterview: INFO

management:
  endpoints:
    web:
      # Only health + info reachable over HTTP — nothing else (env, beans, threaddump,
      # etc.) is exposed, so SecurityConfig only needs one permitAll rule for this.
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      # "ADMIN" here matches the ROLE_ADMIN granted authority JwtAuthenticationFilter
      # already sets for admin users — same role used by SecurityConfig's
      # hasRole("ADMIN") rules elsewhere. Non-admins (and the unauthenticated
      # liveness/readiness probes below) just get {"status":"UP"}, no component detail.
      roles: ADMIN
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  jwt:
    # Local-dev-only default. Override with the JWT_SECRET env var for any shared/deployed environment —
    # HMAC-SHA256 needs >= 256 bits; this is a placeholder, not a real secret.
    secret: ${JWT_SECRET:dev-only-change-me-0123456789abcdef0123456789abcdef}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  password-reset:
    token-ttl-minutes: 60
  storage:
    # Local-disk proof storage for dev. Swap for an S3-backed implementation of
    # ProofStorageService in Phase 6 without touching callers.
    proof-dir: ${PROOF_STORAGE_DIR:./uploads/proof}
  pricing:
    # Platform-fixed viewer unlock price (paise), applied to every experience at
    # creation time — contributors don't set their own price. Tiering by company/role
    # is a later feature.
    default-price-paise: 9900
    # Flat one-time contributor payout (paise) on publish — separate from the viewer
    # price above; per the Phase 0 design these are two independent platform-set amounts.
    contributor-payout-paise: 50000
  razorpay:
    # No safe local-dev default for real payment credentials — set these as env vars,
    # never commit actual values. Test Mode keys from dashboard.razorpay.com are fine
    # to use locally; they don't move real money.
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

# Error tracking (sentry.io). Blank DSN = the Sentry Spring Boot starter quietly
# no-ops (no crashes, no events sent) — same pattern as the Razorpay keys above. Create
# a free Sentry project and set SENTRY_DSN when you're ready to use this.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  # Performance tracing is separate from error reporting and samples/costs differently —
  # off by default. Set SENTRY_TRACES_SAMPLE_RATE (0.0-1.0) once you want it.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
