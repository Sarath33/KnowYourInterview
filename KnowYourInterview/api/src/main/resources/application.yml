spring:
  application:
    name: know-your-interview-api

  datasource:
    url: jdbc:postgresql://localhost:5432/kyi
    username: kyi
    password: kyi_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.knowyourinterview: INFO
