# Activate with SPRING_PROFILES_ACTIVE=prod (or spring.profiles.active=prod) once
# actually deployed. Not used for local dev on purpose — ECS-formatted JSON logs are
# great for a log aggregator (CloudWatch, ELK, etc.) and unreadable in a plain terminal,
# so local dev keeps Spring Boot's normal human-readable console pattern (see
# application.yml, which has no logging.structured.* section).
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.knowyourinterview: INFO
