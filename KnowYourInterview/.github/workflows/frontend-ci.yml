name: frontend-ci

on:
  push:
    paths:
      - "web/**"
      - "shared/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "shared/**"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npx tsc -b

      - name: Test
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build
