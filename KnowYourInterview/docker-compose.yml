services:
  postgres:
    image: postgres:17-alpine
    container_name: kyi-postgres
    environment:
      POSTGRES_DB: kyi
      POSTGRES_USER: kyi
      POSTGRES_PASSWORD: kyi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - kyi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyi -d kyi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kyi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kyi_postgres_data:
